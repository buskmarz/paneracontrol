<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panera B2B · Proveedores de postres para cafeterías</title>
  <meta name="theme-color" content="#fbfaf8">
  <link rel="icon" href="/assets/logo-panera.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/b2b/styles.css">
</head>
<body>
  <div class="b2b-shell">
    <header class="b2b-nav">
      <div class="b2b-nav-inner">
        <a class="brand-mark" href="/b2b/" aria-label="Panera Signature B2B">
          <img src="/assets/logo-panera.png" alt="Panera Signature">
          <span>B2B</span>
        </a>
        <nav class="nav-links" aria-label="B2B">
          <a href="/b2b/" aria-current="page">Inicio</a>
          <a href="/b2b/catalogo/">Catálogo</a>
          <a href="/b2b/pedido/">Pedido</a>
        </nav>
      </div>
    </header>
    <main class="wrap">
      <section class="hero">
        <div>
          <p class="eyebrow">Panera Signature para negocios</p>
          <h1>Proveedores de postres para cafeterías</h1>
          <p class="subtitle">Pastelería artesanal lista para tu negocio</p>
          <div class="hero-actions">
            <a class="button primary" href="/b2b/catalogo/">Ver catálogo</a>
            <a class="button secondary" href="/b2b/pedido/">Pedir por WhatsApp</a>
          </div>
        </div>
        <aside class="hero-panel" aria-label="Selección Panera Signature">
          <div class="hero-photo">
            <img src="/b2b/assets/hero-desserts.svg" alt="Postres artesanales Panera Signature">
            <div class="hero-note">
              <span>Pedidos por volumen</span>
              <strong>1-5 · 6-15 · 16+</strong>
            </div>
          </div>
        </aside>
      </section>
    </main>
    <footer class="footer">Panera Signature · Postres artesanales para cafeterías y negocios</footer>
  </div>
</body>
</html>
