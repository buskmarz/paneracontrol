<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Catálogo B2B · Panera Signature</title>
  <meta name="theme-color" content="#fbfaf8">
  <link rel="icon" href="/assets/logo-panera.png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/b2b/styles.css">
</head>
<body>
  <div class="b2b-shell">
    <header class="b2b-nav">
      <div class="b2b-nav-inner">

          <img src="/assets/logo-panera.png" alt="Panera Signature">
          <span>B2B</span>
        </a>
        <nav class="nav-links" aria-label="B2B">
          <a href="/b2b/">Inicio</a>
          <a href="/b2b/catalogo/" aria-current="page">Catálogo</a>
          <a href="/b2b/pedido/">Pedido</a>
        </nav>
      </div>
    </header>
    <main class="wrap">
      <div class="page-head">
        <div>
          <p class="eyebrow">Catálogo para cafeterías</p>
          <h1>Postres listos para vitrina</h1>
          <p>Precios por volumen y selección rápida para armar el pedido.</p>
        </div>
        <a class="button secondary" href="/b2b/pedido/">Revisar pedido</a>
      </div>
      <section class="catalog-grid" data-catalog-grid aria-label="Productos B2B"></section>
    </main>
    <footer class="footer">Panera Signature · Catálogo B2B</footer>
  </div>
  <script src="/b2b/data.js"></script>
  <script src="/b2b/b2b.js"></script>
